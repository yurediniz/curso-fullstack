<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatodor de likes</title>
</head>
<body>
    <h1 id="qtdCurtidas">Curtidas: 0</h1>
    <button id="btCurtidas">Curtir</button>

    <script>
        const quantidadeCurtidas = document.querySelector("#qtdCurtidas");
        const botao = document.querySelector("#btCurtidas");
        let curtidas = 0

        botao.addEventListener ("click", () => {    
            curtidas++;
            quantidadeCurtidas.textContent = `Curtidas: ${curtidas}`;
        });

    </script>
</body>
</html>
